name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} --package drag-cli

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          artifact="drag-${{ matrix.target }}"
          mkdir -p "dist/$artifact"
          cp "target/${{ matrix.target }}/release/drag" "dist/$artifact/"
          cp LICENSE README.md CHANGELOG.md "dist/$artifact/"
          tar -czf "dist/$artifact.tar.gz" -C dist "$artifact"
          (cd dist && shasum -a 256 "$artifact.tar.gz" > "$artifact.tar.gz.sha256")

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $artifact = "drag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$artifact"
          Copy-Item "target/${{ matrix.target }}/release/drag.exe" "dist/$artifact/"
          Copy-Item LICENSE, README.md, CHANGELOG.md "dist/$artifact/"
          Compress-Archive -Path "dist/$artifact" -DestinationPath "dist/$artifact.zip"
          $hash = (Get-FileHash "dist/$artifact.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifact.zip" | Out-File -Encoding ascii "dist/$artifact.zip.sha256"

      - name: Attest artifact
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/drag-${{ matrix.target }}.${{ matrix.archive }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: drag-${{ matrix.target }}
          path: |
            dist/drag-${{ matrix.target }}.${{ matrix.archive }}
            dist/drag-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: drag-*
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes artifacts/*

  npm:
    name: Publish npm bootstrap package
    needs: release
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Node 24 includes an npm version with Trusted Publishing support.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify tag and package versions match
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./npm/package.json').version")"
      - name: Publish with npm Trusted Publishing
        working-directory: npm
        run: npm publish --access public

  homebrew:
    name: Update Homebrew tap
    needs: release
    if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}
    uses: ./.github/workflows/homebrew.yml
    with:
      tag: ${{ github.ref_name }}
      tap_repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
    secrets:
      tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
