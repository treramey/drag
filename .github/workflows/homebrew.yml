name: Homebrew

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      tag: { required: true, type: string }
      tap_repository: { required: true, type: string }
    secrets:
      tap_token: { required: true }

jobs:
  formula:
    runs-on: ubuntu-latest
    steps:
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.sha256' --dir checksums
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.tap_token }}
          TAG: ${{ inputs.tag }}
          TAP: ${{ inputs.tap_repository }}
        run: |
          version="${TAG#v}"
          mac_arm=$(awk '{print $1}' checksums/drag-aarch64-apple-darwin.tar.gz.sha256)
          mac_intel=$(awk '{print $1}' checksums/drag-x86_64-apple-darwin.tar.gz.sha256)
          linux=$(awk '{print $1}' checksums/drag-x86_64-unknown-linux-gnu.tar.gz.sha256)
          gh auth setup-git
          gh repo clone "$TAP" tap
          mkdir -p tap/Formula
          cat > tap/Formula/drag.rb <<RUBY
          class Drag < Formula
            desc "Fast Tempo.io Cloud command-line client"
            homepage "https://github.com/treramey/drag"
            version "$version"
            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/treramey/drag/releases/download/$TAG/drag-aarch64-apple-darwin.tar.gz"
                sha256 "$mac_arm"
              else
                url "https://github.com/treramey/drag/releases/download/$TAG/drag-x86_64-apple-darwin.tar.gz"
                sha256 "$mac_intel"
              end
            end
            on_linux do
              url "https://github.com/treramey/drag/releases/download/$TAG/drag-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$linux"
            end
            def install
              bin.install Dir["drag-*/drag"].first => "drag"
              bin.install Dir["drag-*/drag-companion"].first => "drag-companion"
            end
            test do
              assert_match version.to_s, shell_output("#{bin}/drag --version")
              assert_match version.to_s, shell_output("#{bin}/drag-companion --version")
            end
          end
          RUBY
          cd tap
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/drag.rb
          git diff --cached --quiet || git commit -m "drag $version"
          git push
