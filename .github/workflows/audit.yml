name: Security audit

on:
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  pull_request:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # cargo-audit
        with:
          tool: cargo-audit
      - name: Run audit
        run: cargo audit
