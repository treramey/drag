name: Security audit

on:
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  pull_request:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cargo-audit
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # cargo-audit
        with:
          tool: cargo-audit
      - name: Run audit
        run: cargo audit
