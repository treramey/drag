name: Security audit

on:
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  pull_request:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # cargo-audit
        with:
          tool: cargo-audit
      - name: Run audit
        run: cargo audit
